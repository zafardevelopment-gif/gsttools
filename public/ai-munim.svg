<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#134e3a"/>
      <stop offset="100%" stop-color="#07271c"/>
    </radialGradient>
  </defs>

  <!-- Dark green tile -->
  <rect width="64" height="64" rx="15" fill="url(#glow)"/>

  <!-- Neural head silhouette (profile facing right) -->
  <path
    d="M20 44c-2-2-4-6-4-10 0-8 6-15 14-15 7 0 12 5 13 11l3 5c.4.7 0 1.5-.8 1.6l-2.2.4v4c0 1.6-1.4 3-3 3h-3v4"
    fill="none" stroke="#34d399" stroke-width="2.2" stroke-linecap="round"
    stroke-linejoin="round" opacity="0.95"/>

  <!-- Network nodes inside the head -->
  <g fill="#a7f3d0">
    <circle cx="25" cy="30" r="1.7"/>
    <circle cx="33" cy="25" r="1.7"/>
    <circle cx="38" cy="33" r="1.7"/>
    <circle cx="28" cy="38" r="1.7"/>
  </g>
  <g stroke="#6ee7b7" stroke-width="1" opacity="0.8">
    <path d="M25 30 33 25M33 25 38 33M38 33 28 38M28 38 25 30M25 30 38 33"/>
  </g>

  <!-- AI monogram -->
  <text x="46" y="27" font-family="Arial, Helvetica, sans-serif" font-size="15"
    font-weight="800" fill="url(#aiGrad)" text-anchor="middle">AI</text>

  <!-- Sparkles -->
  <circle cx="16" cy="18" r="1" fill="#bbf7d0" opacity="0.9"/>
  <circle cx="50" cy="46" r="1.2" fill="#86efac" opacity="0.8"/>
</svg>
